<!DOCTYPE html>
<html lang="es" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyectos | Arquitecto</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/animations.css">
  <link rel="stylesheet" href="./css/responsive.css">

  <style>
    .page-header {
      padding-top: calc(var(--header-height) + var(--space-xl));
      padding-bottom: var(--space-lg);
      background-color: var(--clr-bg-alt);
    }
  </style>
</head>

<body>
  <div class="custom-cursor"></div>
  <div class="custom-cursor-follower"></div>

  <!-- Header -->
  <header class="header">
    <div class="container nav">
      <a href="index.html" class="logo">Arquitecto</a>
      <nav class="nav-links">
        <a href="index.html" class="nav-link magnetic">Inicio</a>
        <a href="about.html" class="nav-link magnetic">Estudio</a>
        <a href="projects.html" class="nav-link active magnetic">Proyectos</a>
        <a href="contact.html" class="nav-link magnetic">Contacto</a>
      </nav>
      <div class="nav-actions">
        <button class="theme-toggle magnetic" aria-label="Toggle Dark Mode"><i class="ph ph-moon"></i></button>
        <button class="menu-btn magnetic" aria-label="Toggle Menu"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <main>
    <section class="page-header">
      <div class="container">
        <span class="subtitle reveal-up">Nuestro Trabajo</span>
        <h1 class="title-xl reveal-up" style="transition-delay: 0.2s">Proyectos Destacados.</h1>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="projects-grid masonry stagger-children">
          <!-- Repeat projects with different Unsplash URLs -->
          <a href="project-details.html" class="project-card gallery-item">
            <div class="project-img">
              <img src="https://images.unsplash.com/photo-1600607687931-ceeb8ce43115?auto=format&fit=crop&w=800&q=80"
                alt="Villa Serena">
            </div>
            <div class="project-info">
              <span class="project-category">Residencial - 2025</span>
              <h3 class="project-title">Villa Serena</h3>
            </div>
          </a>
          <a href="project-details.html" class="project-card gallery-item">
            <div class="project-img">
              <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=800&q=80"
                alt="Torre Lumina">
            </div>
            <div class="project-info">
              <span class="project-category">Comercial - 2024</span>
              <h3 class="project-title">Torre Lumina</h3>
            </div>
          </a>
          <a href="project-details.html" class="project-card gallery-item">
            <div class="project-img">
              <img src="https://images.unsplash.com/photo-1600566753086-00f18efc2291?auto=format&fit=crop&w=800&q=80"
                alt="Penthouse Horizon">
            </div>
            <div class="project-info">
              <span class="project-category">Interiorismo - 2024</span>
              <h3 class="project-title">Penthouse Horizon</h3>
            </div>
          </a>
          <a href="project-details.html" class="project-card gallery-item">
            <div class="project-img">
              <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800&q=80"
                alt="Casa de la Roca">
            </div>
            <div class="project-info">
              <span class="project-category">Remodelación - 2023</span>
              <h3 class="project-title">Casa de la Roca</h3>
            </div>
          </a>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Arquitecto Todos los derechos reservados.</p>
        <p>Premium Studio Design</p>
      </div>
    </div>
  </footer>

  <script src="./js/darkmode.js"></script>
  <script src="./js/scroll.js"></script>
  <script src="./js/animations.js"></script>
  <script src="./js/magnetic.js"></script>
  <script src="./js/transitions.js"></script>
  <script src="./js/gallery.js"></script>
  <script src="./js/main.js"></script>
</body>

</html>
